name: Container Images

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: orchestrator
            dockerfile: Dockerfile.orchestrator
            image: agent-orchestration-orchestrator
          - name: agents
            dockerfile: Dockerfile.agents
            image: agent-orchestration-agents

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-validate:
    name: Validate Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose -f docker-compose.yml config > /tmp/compose.out

      - name: Ensure compose has required services
        run: |
          grep -q "orchestrator:" /tmp/compose.out
          grep -q "agents:" /tmp/compose.out
          grep -q "postgres:" /tmp/compose.out
